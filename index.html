<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heart.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8a79ab" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="N&amp;H" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>N&amp;H - Notre Amour</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; background: #f8f7fa; }
      body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
      #splash { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 16px; color: #8a79ab; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #splash svg { width: 56px; height: 56px; }
      #splash span { font-size: 18px; font-weight: 600; }
      #splash .loader { width: 32px; height: 32px; border: 3px solid #e5e0f0; border-top-color: #8a79ab; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      <span>N&amp;H</span>
      <div class="loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      var t = 0
      document.addEventListener('click', function() {
        t++; if (t >= 5) { t = 0; var s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/eruda'; document.body.appendChild(s); s.onload = function() { eruda.init() } }
      })
      window.addEventListener('error', function(e) {
        var msg = e.message || ''
        if (e.filename) msg += ' [' + e.filename.split('/').pop() + ']'
        var s = document.getElementById('splash')
        if (s) s.innerHTML = '<span style="color:#666;font-size:14px;text-align:center;padding:20px">⚠ ' + msg.slice(0, 100) + '</span>'
      })
      window.addEventListener('unhandledrejection', function(e) {
        var s = document.getElementById('splash')
        if (s) s.innerHTML = '<span style="color:#666;font-size:14px;text-align:center;padding:20px">⚠ ' + String(e.reason).slice(0, 100) + '</span>'
      })
      setTimeout(function() {
        var s = document.getElementById('splash')
        if (s && s.style.display !== 'none' && !document.querySelector('#root > *:not(#splash)')) {
          s.innerHTML = '<span style="color:#666;font-size:14px;text-align:center;padding:20px">⚠ L\'app n\'a pas pu se charger (15s). Essaie de rouvrir.</span>'
        }
      }, 15000)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(rr) {
          rr.forEach(function(r) { r.unregister() })
        }).catch(function(){})
        if (window.caches) {
          caches.keys().then(function(ks) {
            ks.forEach(function(k) { caches.delete(k) })
          }).catch(function(){})
        }
      }
    </script>
  </body>
</html>
