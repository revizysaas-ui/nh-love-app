<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heart.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8a79ab" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="N&amp;H" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>N&amp;H - Notre Amour</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
      body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(() => {
          if (!navigator.serviceWorker.controller) {
            window.location.reload()
          }
        })
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload()
        })
      }
    </script>
  </body>
</html>
