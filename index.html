<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heart.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8a79ab" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="N&amp;H" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>N&amp;H - Notre Amour</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; background: #faf8ff; }
      body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
      #splash {
        display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 16px;
        color: #8a79ab; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #faf8ff 0%, #f8e0ec 50%, #faf8ff 100%);
      }
      #splash .splash-logo {
        width: 80px; height: 80px; border-radius: 50%;
        background: linear-gradient(135deg, #f8e0ec, #f3eef9);
        display: flex; align-items: center; justify-content: center;
        animation: splashPulse 2s ease-in-out infinite;
      }
      #splash svg { width: 40px; height: 40px; color: #e8b4c8; }
      #splash .splash-title {
        font-size: 28px; font-weight: 800;
        background: linear-gradient(135deg, #8a79ab, #e8b4c8);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
      #splash .loader { width: 32px; height: 32px; border: 3px solid #e8dff0; border-top-color: #8a79ab; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </div>
      <span class="splash-title">N&H</span>
      <div class="loader"></div>
    </div>
    <div id="root"></div>
    <script>document.title = 'N&H (JS OK)'</script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      var t = 0
      document.addEventListener('click', function() {
        t++; if (t >= 5) { t = 0; var s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/eruda'; document.body.appendChild(s); s.onload = function() { eruda.init() } }
      })
      function showError(msg) {
        var s = document.getElementById('splash')
        var r = document.getElementById('root')
        var h = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:#faf8ff;font-family:-apple-system,sans-serif;text-align:center"><div><p style="font-size:14px;color:#666;margin-bottom:8px">⚠ ' + msg + '</p><p style="font-size:12px;color:#999">Ferme et rouvre l\'app</p></div></div>'
        if (s) { s.innerHTML = h; s.style.display = 'flex' }
        else if (r) r.innerHTML = h
      }
      window.addEventListener('error', function(e) {
        showError((e.error && e.error.message ? e.error.message : e.message || 'Erreur').slice(0,80))
      })
      window.addEventListener('unhandledrejection', function(e) {
        showError(String(e.reason).slice(0,80))
      })
      setTimeout(function() {
        var s = document.getElementById('splash')
        if (s && !s.innerHTML.includes('Erreur') && !document.querySelector('#root > div')) {
          showError('L\'app n\'a pas pu se charger')
        }
      }, 15000)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(rr) {
          rr.forEach(function(r) { r.unregister() })
        }).catch(function(){})
        if (window.caches) {
          caches.keys().then(function(ks) {
            ks.forEach(function(k) { caches.delete(k) })
          }).catch(function(){})
        }
      }
    </script>
  </body>
</html>
